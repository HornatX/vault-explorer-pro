name: Smart Release Obsidian Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      # 获取版本号 (1.0.5)
      - name: Get version from manifest.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "pkg_version=$VERSION" >> $GITHUB_OUTPUT

      # 【修改点 1】检查 Tag 时去掉 v。直接检查 1.0.5
      - name: Check if Release exists
        id: check_release
        run: |
          VERSION=${{ steps.get_version.outputs.pkg_version }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "版本 $VERSION 已存在，跳过。"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        if: steps.check_release.outputs.exists == 'false'
        run: npm install --legacy-peer-deps

      - name: Build plugin
        if: steps.check_release.outputs.exists == 'false'
        run: npm run build --ignore-scripts

      # 【修改点 2 & 3】创建 Release 时去掉 tag_name 和 name 前面的 v
      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.pkg_version }} # 去掉了 v
          name: ${{ steps.get_version.outputs.pkg_version }}     # 去掉了 v
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}